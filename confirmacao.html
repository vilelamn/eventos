<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirmação de Presença</title>
    <style>
      body {
        font-family: "Poppins", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f3f3f3;
        margin: 0;
      }
      .container {
        background: white;
        padding: 25px;
        border-radius: 16px;
        width: 90%;
        max-width: 420px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      }
      h2 {
        color: #1a73e8;
        text-align: center;
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-weight: bold;
        margin-top: 15px;
        margin-bottom: 5px;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 16px;
      }

      /* Estilo da Câmera ao Vivo */
      #camera-container {
        width: 100%;
        position: relative;
        display: none;
        margin-top: 10px;
        text-align: center;
      }
      video {
        width: 100%;
        border-radius: 10px;
        background: #000;
      }
      canvas {
        display: none;
      }

      .btnAcao {
        display: inline-block;
        width: 100%;
        text-align: center;
        background-color: #1a73e8;
        color: white;
        padding: 12px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        border: none;
        transition: 0.2s;
      }
      .btnCaptura {
        background-color: #28a745;
      }
      .btnSucesso {
        background-color: #1557b0;
      }

      #preview-foto {
        width: 100%;
        border-radius: 10px;
        display: none;
        margin-top: 10px;
      }
      button#btnSubmit {
        background-color: #1a73e8;
        font-size: 18px;
        margin-top: 25px;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }

      #loadingOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.9);
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 9999;
      }
      .spinner {
        border: 6px solid #f3f3f3;
        border-top: 6px solid #1a73e8;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
            transform: rotate(0deg);
        }
        100% {
            transform: rotate(360deg);
        }
    }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Confirmação de Presença</h2>

      <label for="nome">Nome Completo</label>
      <input type="text" id="nome" autocomplete="off" />

      <label for="email">E-mail</label>
      <input type="email" id="email" autocomplete="off" />

      <label>Telefone</label>
      <input type="tel" id="telefone" placeholder="(00) 00000-0000" />

      <label>Identificação Visual</label>
      <button type="button" class="btnAcao" id="btnLigarCamera">
        📸 Ligar Câmera
      </button>

      <div id="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <button type="button" class="btnAcao btnCaptura" id="btnSnap">
          Capturar Foto Agora
        </button>
      </div>

      <img id="preview-foto" src="" />
      <canvas id="canvas"></canvas>

      <button type="button" class="btnAcao btnSucesso" id="btnSubmit">
        ENVIAR TUDO
      </button>
      <div id="status" class="text-center mt-[10px] font-bold"></div></div>
    </div>

    <div id="loadingOverlay">
      <div class="spinner"></div>
      <p id="loadingText">Enviando...</p>
    </div>

    <script>
      // MUDANÇA AQUI: URL da sua API única do Google Apps Script
      // Se este arquivo for aberto de forma avulsa pelos convidados, ele precisa conhecer a API_URL
      const API_URL =
        window.API_URL_BASE || "https://script.google.com/macros/s/AKfycbydL9Fj-dOGNQ3gtqHGMBAQ8z4EVCaAbhCZqT9CwNsNAZ9gPSIBOqYIexIDXtT6fsloDQ/exec";

      // MUDANÇA AQUI: Captura do ID do Evento dinamicamente via parâmetro na URL (?idEvento=XXXXXXXXX)
      // Isso permite reutilizar a mesma página de confirmação para eventos diferentes!
      const urlParams = new URLSearchParams(window.location.search);
      const ID_EVENTO = urlParams.get("idEvento") || "PADRAO_OU_EM_BRANCO";

      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const preview = document.getElementById("preview-foto");
      const cameraContainer = document.getElementById("camera-container");
      const btnLigar = document.getElementById("btnLigarCamera");
      let fotoBase64 = null;

      // --- LÓGICA DA CÂMERA (Mantida idêntica, está perfeita) ---
      btnLigar.addEventListener("click", async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" },
            audio: false,
          });
          video.srcObject = stream;
          cameraContainer.style.display = "block";
          btnLigar.style.display = "none";
          preview.style.display = "none";
        } catch (err) {
          alert("Erro ao acessar câmera: " + err.message);
        }
      });

      document.getElementById("btnSnap").addEventListener("click", () => {
        const context = canvas.getContext("2d");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const stream = video.srcObject;
        if (stream) stream.getTracks().forEach((track) => track.stop());

        fotoBase64 = canvas.toDataURL("image/jpeg", 0.8);
        preview.src = fotoBase64;
        preview.style.display = "block";
        cameraContainer.style.display = "none";
        btnLigar.style.display = "block";
        btnLigar.innerText = "🔄 Tirar Outra Foto";
      });

      // --- MUDANÇA AQUI: LÓGICA DE ENVIO CONECTADA VIA FETCH (MÉTODO POST UNIFICADO) ---
      document
        .getElementById("btnSubmit")
        .addEventListener("click", async () => {
          const nome = document.getElementById("nome").value.trim();
          const email = document.getElementById("email").value.trim();
          const telefone = document.getElementById("telefone").value.trim();
          const statusDiv = document.getElementById("status");

          if (!nome || !email || !fotoBase64) {
            statusDiv.style.color = "red";
            statusDiv.innerText = "❌ Preencha tudo e tire a foto!";
            return;
          }

          document.getElementById("loadingOverlay").style.display = "flex";
          document.getElementById("btnSubmit").disabled = true;
          statusDiv.innerText = "";

          try {
            const base64Pura = fotoBase64.split(",")[1];

            // Enviamos tudo em uma única requisição POST limpa para a Planilha economizando processamento
            const response = await fetch(API_URL, {
              method: "POST",
              headers: { "Content-Type": "text/plain" },
              body: JSON.stringify({
                acao: "confirmarPresenca",
                idEvento: ID_EVENTO,
                nome: nome,
                email: email,
                telefone: telefone,
                foto: base64Pura,
              }),
            });

            const data = await response.json();

            if (data.success) {
              statusDiv.style.color = "green";
              statusDiv.innerText = "✅ Sucesso! Presença confirmada.";
              limparForm();
            } else {
              throw new Error(
                data.message || "Erro desconhecido devolvido do Sheets.",
              );
            }
          } catch (err) {
            statusDiv.style.color = "red";
            statusDiv.innerText = "❌ Erro ao enviar: " + err.message;
          } finally {
            document.getElementById("loadingOverlay").style.display = "none";
            document.getElementById("btnSubmit").disabled = false;
          }
        });

      function limparForm() {
        document.getElementById("nome").value = "";
        document.getElementById("email").value = "";
        document.getElementById("telefone").value = "";
        preview.style.display = "none";
        fotoBase64 = null;
        btnLigar.innerText = "📸 Ligar Câmera";
      }
    </script>
  </body>
</html>
