<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard de Permissões - Sistema SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;900&display=swap");
      body {
        font-family: "Inter", sans-serif;
        background-color: #f7f9fb;
      }

      /* Estilos de Transição SPA e Cards */
      .card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 0;
        display: none;
        transform: translateY(10px);
      }
      .card.is-visible {
        opacity: 1;
        display: block;
        transform: translateY(0);
      }
      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      }
    </style>
  </head>

  <body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto mb-10 flex flex-col md:flex-row md:items-center md:justify-between gap-6 border-b border-gray-100 pb-8">
      <div>
        <p class="text-sm font-semibold text-indigo-600 mb-1">Bem-vindo de volta,</p>
        <h1 id="user-name" class="text-3xl font-black text-gray-900 tracking-tight">--</h1>
        <p id="user-email-display" class="text-xs text-gray-400 font-mono mt-1">--</p>
      </div>

      <div class="flex items-center gap-4 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
        <div class="h-10 w-10 rounded-xl bg-indigo-50 flex items-center justify-center text-xl">🛡️</div>
        <div>
          <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Nível de Acesso</p>
          <p id="user-role" class="text-sm font-bold text-gray-800">--</p>
        </div>
      </div>
    </div>

    <div class="max-w-6xl mx-auto mb-8 border-b border-gray-200">
      <nav class="-mb-px flex space-x-8" aria-label="Tabs">
        <button id="nav-dashboard" onclick="carregarVisualizacao('dashboard')" class="border-indigo-600 text-indigo-600 pb-4 px-1 border-b-2 font-medium text-sm transition-all">
          📊 Dashboard
        </button>
        <button id="nav-eventos" onclick="carregarVisualizacao('eventos')" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 pb-4 px-1 border-b-2 font-medium text-sm transition-all">
          📅 Gerir Eventos
        </button>
        <button id="nav-equipe" onclick="carregarVisualizacao('equipe')" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 pb-4 px-1 border-b-2 font-medium text-sm transition-all">
          👥 Minha Equipa
        </button>
      </nav>
    </div>

    <div class="max-w-6xl mx-auto">
      
      <div id="dashboard-view" class="card is-visible space-y-8">
        <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
          <h2 class="text-xl font-bold text-gray-800 mb-2">Resumo Geral do Sistema</h2>
          <p class="text-sm text-gray-500">Métricas em tempo real ligadas à tua conta.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="bg-indigo-600 p-8 rounded-3xl shadow-xl shadow-indigo-100 text-white">
            <p class="text-xs font-bold text-indigo-200 uppercase mb-2">Eventos Ativos</p>
            <p id="stat-eventos-ativos" class="text-5xl font-black tracking-tighter">--</p>
          </div>
          
          <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
            <p class="text-xs font-bold text-gray-400 uppercase mb-2">Total de Cerimonialistas / Equipa</p>
            <p id="stat-cerimonialistas" class="text-5xl font-black text-gray-800 tracking-tighter">--</p>
          </div>
        </div>
      </div>

      <div id="spa-container" class="hidden"></div>

    </div>

    <div id="loadingOverlay" class="hidden fixed inset-0 items-center justify-center bg-white/90 z-[9999]">
      <div class="flex flex-col items-center">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-200 border-t-indigo-600 mb-4"></div>
        <p id="loadingText" class="text-sm font-semibold text-gray-600">A processar dados...</p>
      </div>
    </div>

    <script>
      // URL de Execução Padrão do teu Google Apps Script
      const API_URL = "https://script.google.com/macros/s/AKfycbydL9Fj-dOGNQ3gtqHGMBAQ8z4EVCaAbhCZqT9CwNsNAZ9gPSIBOqYIexIDXtT6fsloDQ/exec";

      // Captura segura de credenciais do localStorage (com valores padrão de contingência)
      let userEmail = localStorage.getItem("userEmail") || "vilelamn@gmail.com";
      let userRole = localStorage.getItem("userRole") || "ADMINISTRADOR";
      let userName = localStorage.getItem("userName") || "Marcelo Vilela";

      /**
       * Renderiza e exibe na interface as credenciais validadas do utilizador
       */
      function inicializarDadosUsuario() {
        document.getElementById("user-name").textContent = userName;
        document.getElementById("user-role").textContent = userRole.toUpperCase();
        document.getElementById("user-email-display").textContent = userEmail;
        
        // Bloqueio de Segurança: Apenas Administradores podem aceder à aba da equipa
        const navEquipe = document.getElementById("nav-equipe");
        if (navEquipe && userRole.toUpperCase() !== "ADMINISTRADOR") {
          navEquipe.style.display = "none";
        }
      }

      /**
       * Faz a chamada assíncrona ao Apps Script injetando email e role
       */
      async function carregarStatsDashboard() {
        try {
          // Passagem correta de email e role via URL para o roteador processarRequisicao()
          const url = `${API_URL}?acao=getStats&email=${encodeURIComponent(userEmail)}&role=${encodeURIComponent(userRole)}`;
          
          const response = await fetch(url);
          if (!response.ok) throw new Error("Falha ao comunicar com o servidor.");
          
          const res = await response.json();

          if (res) {
            document.getElementById("stat-eventos-ativos").textContent = res.ativos !== undefined ? res.ativos : "0";
            document.getElementById("stat-cerimonialistas").textContent = res.cerimonialistas !== undefined ? res.cerimonialistas : "0";
          }
        } catch (error) {
          console.error("Erro ao obter estatísticas:", error);
          document.getElementById("stat-eventos-ativos").textContent = "!";
          document.getElementById("stat-cerimonialistas").textContent = "!";
        }
      }

      /**
       * Gerenciador SPA Local (Altera abas e faz fetch/injeção de ficheiros locais se necessário)
       */
      async function carregarVisualizacao(viewId) {
        const dashboardView = document.getElementById("dashboard-view");
        const spaContainer = document.getElementById("spa-container");
        const loading = document.getElementById("loadingOverlay");

        // Reseta estados visuais dos botões da navbar
        document.querySelectorAll('nav button').forEach(btn => {
          btn.classList.remove('border-indigo-600', 'text-indigo-600');
          btn.classList.add('border-transparent', 'text-gray-500');
        });

        // Aplica estilo ativo no botão selecionado
        const activeBtn = document.getElementById(`nav-${viewId}`);
        if (activeBtn) {
          activeBtn.classList.remove('border-transparent', 'text-gray-500');
          activeBtn.classList.add('border-indigo-600', 'text-indigo-600');
        }

        // Fluxo de roteamento SPA
        if (viewId === 'dashboard') {
          if (spaContainer) spaContainer.classList.add("hidden");
          if (dashboardView) {
            dashboardView.classList.add("is-visible");
            dashboardView.style.display = "block";
          }
          await carregarStatsDashboard();
        } 
        else {
          // Oculta aba do dashboard principal
          if (dashboardView) {
            dashboardView.classList.remove("is-visible");
            dashboardView.style.display = "none";
          }
          if (spaContainer) spaContainer.classList.remove("hidden");

          if (loading) loading.style.display = "flex";

          try {
            // Mapeia o destino com base no ID da aba
            let targetFile = viewId === 'eventos' ? 'clientes.html' : 'cadastroUsuarios.html';
            
            const response = await fetch(targetFile);
            if (!response.ok) throw new Error(`Não foi possível carregar o arquivo ${targetFile}`);
            
            const htmlContent = await response.text();
            
            if (spaContainer) {
              spaContainer.innerHTML = htmlContent;
              
              // Executa scripts embutidos no HTML injetado para garantir inicialização
              const scripts = spaContainer.querySelectorAll("script");
              scripts.forEach(oldScript => {
                const newScript = document.createElement("script");
                if (oldScript.src) {
                  newScript.src = oldScript.src;
                } else {
                  newScript.textContent = oldScript.textContent;
                }
                document.body.appendChild(newScript).parentNode.removeChild(newScript);
              });
            }
          } catch (err) {
            if (spaContainer) {
              spaContainer.innerHTML = `<div class="bg-white p-6 rounded-2xl border border-red-100 text-red-500 font-semibold text-center">
                Erro ao carregar a página: ${err.message}</div>`;
            }
          } finally {
            if (loading) loading.style.display = "none";
          }
        }
      }

      /**
       * Atalho global para que as subpáginas consigam acionar o regresso ao Dashboard
       */
      window.voltarParaDashboard = function() {
        carregarVisualizacao('dashboard');
      };

      // Inicialização assim que o DOM estiver carregado por completo
      document.addEventListener("DOMContentLoaded", async () => {
        inicializarDadosUsuario();
        await carregarStatsDashboard();
      });
    </script>
  </body>
</html>
