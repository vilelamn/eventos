<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão de Contratos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#4f46e5" },
          },
        },
      };
    </script>
  </head>
  <body class="bg-gray-100 min-h-screen py-10">
    <div class="max-w-4xl mx-auto p-4 sm:p-8">
      <header
        class="mb-8 p-6 bg-white rounded-xl shadow-lg flex justify-between items-center border-l-8 border-indigo-600"
      >
        <div>
          <h1 class="text-2xl font-bold text-gray-800">
            Gestão de Contrato SaaS
          </h1>
          <p class="text-sm text-gray-500">
            Configure as regras de utilização e cobrança
          </p>
        </div>
        <button
          onclick="voltarParaDashboard()"
          class="px-4 py-2 border border-indigo-600 text-indigo-600 rounded-lg hover:bg-indigo-50 transition"
        >
          ◀ Painel
        </button>
      </header>

      <div class="bg-white rounded-2xl shadow-xl p-6 border border-indigo-200">
        <form id="formContrato" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label
              for="cerimonialista"
              class="block text-sm font-semibold text-gray-700 mb-2"
              >Cerimonialista</label
            >
            <select
              id="cerimonialista"
              class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
            >
              <option value="">Carregando cerimonialistas...</option>
            </select>
          </div>

          <div>
            <label
              for="plano"
              class="block text-sm font-semibold text-gray-700 mb-2"
              >Plano de Assinatura</label
            >
            <select
              id="plano"
              class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
            >
              <option value="base">Plano Base (Até 100 check-ins)</option>
              <option value="pro">Plano Pro (Até 500 check-ins)</option>
              <option value="enterprise">Enterprise (Ilimitado)</option>
              <option value="custom">Personalizado / Negociação Direta</option>
            </select>
          </div>

          <div>
            <label
              for="valor"
              class="block text-sm font-semibold text-gray-700 mb-2"
              >Valor Acordado (R$)</label
            >
            <input
              type="number"
              id="valor"
              step="0.01"
              placeholder="0,00"
              class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none"
            />
          </div>

          <div>
            <label
              for="ciclo"
              class="block text-sm font-semibold text-gray-700 mb-2"
              >Ciclo de Pagamento</label
            >
            <select
              id="ciclo"
              class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none"
            >
              <option value="mensal">Mensal</option>
              <option value="anual">Anual (Desconto)</option>
            </select>
          </div>

          <div>
            <label
              for="expiracao"
              class="block text-sm font-semibold text-gray-700 mb-2"
              >Data de Expiração</label
            >
            <input
              type="date"
              id="expiracao"
              class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none"
            />
          </div>

          <div class="col-span-full mt-4">
            <button
              type="button"
              id="btnSalvarContrato"
              onclick="salvarContratoSaaS()"
              class="w-full py-4 bg-green-600 text-white rounded-2xl font-bold shadow-lg hover:bg-green-700 transition active:scale-95"
            >
              ATUALIZAR CONTRATO
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
  // 1. URL da sua Implantação (Deploy) do Google Apps Script
  const URL_API = "https://script.google.com/macros/s/AKfycbzDjyuNF6Rf2go35cRMgTT60qrtxZ706rDWPI04Zg-9SH7BcK3J_0LSxENRmzdeBue4/exec";

  async function carregarCerimonialistas() {
    const select = document.getElementById("cerimonialista");
    try {
      // 2. Chamada usando a query string 'acao'
      const response = await fetch(`${URL_API}?acao=getCerimonialistas`);
      const lista = await response.json();

      select.innerHTML = '<option value="">Selecione um cerimonialista</option>';
      lista.forEach((c) => {
        const opt = document.createElement("option");
        opt.value = c.id; // Certifique-se que o campo no GAS chama 'id' ou ajuste para 'id_username'
        opt.textContent = `${c.nome} (${c.email})`;
        select.appendChild(opt);
      });
    } catch (err) {
      select.innerHTML = '<option value="">Erro ao carregar lista</option>';
    }
  }

  async function salvarContratoSaaS() {
    const btn = document.getElementById("btnSalvarContrato");
    const dados = {
      cerimonialistaId: document.getElementById("cerimonialista").value,
      plano: document.getElementById("plano").value,
      valor: document.getElementById("valor").value,
      ciclo: document.getElementById("ciclo").value,
      expiracao: document.getElementById("expiracao").value,
    };

    if (!dados.cerimonialistaId) return alert("Selecione um cerimonialista");

    btn.disabled = true;
    btn.textContent = "Processando...";

    try {
      // 3. POST para o Google Apps Script passando a AÇÃO e os DADOS
      const response = await fetch(URL_API, {
        method: "POST",
        // O GAS recebe o corpo como string, vamos passar um JSON no 'body'
        body: JSON.stringify({
          acao: 'salvarContrato', // Ação que você criará no seu GAS
          dados: dados
        })
      });

      const res = await response.json();
      if (res.success) {
        alert("✅ Contrato atualizado com sucesso!");
        window.location.reload();
      } else {
        alert("Erro: " + res.message);
      }
    } catch (err) {
      console.error(err);
      alert("Erro de comunicação com o servidor.");
    } finally {
      btn.disabled = false;
      btn.textContent = "ATUALIZAR CONTRATO";
    }
  }

  carregarCerimonialistas();
</script>
  </body>
</html>
